<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meta-Reflexion — Valérie Heynen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f7f5;--surface:#fff;--border:#e4e4e0;--text-primary:#1a1a18;--text-secondary:#6b6b67;--text-tertiary:#a0a09c;--radius:12px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(247,247,245,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-size:14px;font-weight:500;color:var(--text-primary);text-decoration:none}
    .nav-back{font-size:13px;color:var(--text-secondary);text-decoration:none}
    .nav-back:hover{color:var(--text-primary)}
    .page-header{padding:100px 40px 48px;max-width:860px;margin:0 auto;border-bottom:1px solid var(--border)}
    .eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:20px}
    h1{font-size:clamp(24px,4vw,40px);font-weight:300;letter-spacing:-.02em;line-height:1.15;margin-bottom:12px}
    h1 em{font-style:italic}
    .content{max-width:860px;margin:0 auto;padding:48px 40px 120px}
    .block{padding:40px 0;border-bottom:1px solid var(--border)}
    .block:last-child{border-bottom:none}
    .block-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:20px}
    .block h2{font-size:18px;font-weight:500;margin-bottom:16px;letter-spacing:-.01em}
    .reflexion-list{display:flex;flex-direction:column;gap:16px}
    .reflexion-item{display:flex;gap:16px;align-items:flex-start}
    .reflexion-dot{width:6px;height:6px;border-radius:50%;background:var(--text-tertiary);margin-top:9px;flex-shrink:0}
    .reflexion-item p{font-size:15px;color:var(--text-secondary);line-height:1.75;max-width:680px}
    @media(max-width:600px){nav{padding:0 20px}.page-header,.content{padding-left:20px;padding-right:20px}}
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Valérie Heynen</a>
    <a class="nav-back" href="index.html">← Alle Challenges</a>
  </nav>

  <header class="page-header">
    <p class="eyebrow">Portfolio — DEAI FHGR</p>
    <h1>Meta-<em>Reflexion</em></h1>
  </header>

  <main class="content">
    <section class="block">
      <p class="block-label">Rückblick auf das Modul</p>
      <h2>Was habe ich gelernt?</h2>
      <div class="reflexion-list">
        <div class="reflexion-item">
          <div class="reflexion-dot"></div>
          <p>Wird noch ergänzt nach Abschluss aller Challenges.</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
